{% extends "layout.html" %}

{% block title %}Registro | Forjadores{% endblock %}

{% block content %}
<section class="min-vh-100 d-flex align-items-center py-4 auth-bg">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-9 col-lg-6" data-aos="fade-up">
        <div class="glass-card p-4 p-md-5 neon-outline">
          <h1 class="h3 fw-bold text-center mb-2">Crear cuenta</h1>
          <p class="text-center text-secondary mb-4">Registrate y activa tu plan en un solo flujo</p>

          <form method="post" action="{{ url_for('auth.registro') }}" class="d-grid gap-3">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label" for="nombres">Nombres</label>
                <input class="form-control form-control-lg" id="nombres" name="nombres" required>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="apellidos">Apellidos</label>
                <input class="form-control form-control-lg" id="apellidos" name="apellidos" required>
              </div>
            </div>
            <div>
              <label class="form-label" for="email">Correo</label>
              <input type="email" class="form-control form-control-lg" id="email" name="email" required>
            </div>
            <div>
              <label class="form-label" for="password">Contrasena</label>
              <input type="password" class="form-control form-control-lg" id="password" name="password" minlength="8" required>
            </div>
            <button class="btn btn-grama btn-lg fw-bold" type="submit">Crear cuenta y continuar a pago</button>
            <a href="{{ url_for('auth.login') }}" class="text-center text-decoration-none">Ya tengo cuenta</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
